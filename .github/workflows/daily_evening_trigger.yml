name: Daily evening trigger (18:42 IST)

on:
  schedule:
    # 18:42 Asia/Kolkata = 13:12 UTC (IST is UTC+5:30, no DST)
    - cron: "12 13 * * *"
  workflow_dispatch:

jobs:
  evening-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send POST request to Render
        run: |
          curl -fsS -X POST "https://vanbutler.onrender.com/internal/daily-evening-trigger" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --retry 5 \
            --retry-delay 15 \
            --retry-connrefused \
            --retry-all-errors \
            --max-time 120